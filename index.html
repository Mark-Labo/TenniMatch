<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>🎾TenniMatch v2.2.7 — 完全版（1面4〜11人テンプレ・シャッフル・スコア・Firebase）</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#333}
    header{padding:16px;text-align:center;color:#fff;font-weight:700}
    #roomInfo{font-size:12px;color:#fff;margin-top:6px}
    .card{background:#fff;border-radius:12px;padding:16px;margin:16px;box-shadow:0 4px 12px rgba(0,0,0,.1)}
    button{background:linear-gradient(135deg,#ff9966,#ff5e62);border:none;padding:10px 14px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;margin:6px}
    button.small{padding:6px 10px;font-size:12px}
    input[type="text"]{padding:8px}
    .guest-slot{display:inline-block;border:1px solid #ccc;border-radius:8px;padding:10px;margin:6px;min-width:90px;text-align:center;background:#eee;cursor:pointer}
    .guest-slot.selected{background:#4caf50;color:#fff;border:none}
    .member-btn{margin:4px;background:#4caf50;color:#fff;padding:8px;border-radius:8px;border:none;cursor:pointer}
    .match-card{border-radius:14px;padding:12px;margin:10px 16px;background:#fff}
    .pair-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0;gap:8px}
    .pair{font-weight:500}
    .vs{text-align:center;font-size:12px;color:#666;margin:2px 0}
    .score-input{width:56px;height:36px;text-align:center;border-radius:8px;border:2px solid #2a5298;background:#f0f4ff}

    .ranking-table th{background:#4caf50;color:#fff}
    #shuffleList{margin-top:12px;padding:10px;border-radius:8px;background:#f7f7f7}
    .muted{color:#666;font-size:13px}

<body>

<header>
  <div>🎾TenniMatch🎾 組合せ＆ランキング v2.2.7</div>
  <div id="roomInfo">部屋: <span id="roomIdDisplay">---</span> <button class="small" onclick="copyRoomLink()">リンクをコピー</button></div>
</header>

<!-- メニュー（UIはv2.2.0と同様） -->
<div id="menu" class="card">
  <h2>メニュー</h2>
  <button onclick="showRegister()">メンバー登録</button>
  <button onclick="showMain()">組合せ生成</button>
  <button onclick="createRoom()">新しい部屋を作る</button>
</div>

<!-- メンバー登録 -->
<div id="register" class="card hidden">
  <h2>メンバー登録</h2>
  <input id="newMember" type="text" placeholder="名前を入力">
  <button onclick="addMember()">登録</button>
  <div id="memberList" style="margin-top:12px;"></div>
  <br>
  <button onclick="backMenu()">戻る</button>
</div>

<!-- 組合せ画面 -->
<div id="main" class="card hidden">
  <h2>参加者選択</h2>

  参加人数：
  <select id="playerCount"></select>

  コート数：
  <select id="courtCount">
    <option value="1">1面</option>
  </select>

  <div id="guestArea" style="margin-top:12px;"></div>

  <h3>登録者リスト</h3>
  <div id="memberButtons"></div>

  <div id="shuffleList" class="hidden card">
    <h3 style="margin-top:0;">参加者シャッフル後リスト（P割当）</h3>
    <div id="shuffleMap" class="muted"></div>
    <div style="margin-top:8px;"><button class="small" onclick="clearShuffle()">シャッフルリストを消す</button></div>
  </div>

  <br>
  <button onclick="generate()">生成（シャッフルしてP割当）</button>
  <button onclick="backMenu()">戻る</button>

  <div id="matches"></div>
  <div id="ranking"></div>
</div>

<!-- room id prefill -->
<script>
  (function(){
    function randomId(len=8){ const chars="abcdefghijklmnopqrstuvwxyz0123456789"; let s=""; for(let i=0;i<len;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length)); return s; }
    const params = new URLSearchParams(window.location.search);
    let rid = params.get("room");
    if(!rid){ rid = "r-" + randomId(6); params.set("room", rid); history.replaceState({}, "", location.pathname + "?" + params.toString()); }
    window.roomId = String(rid);
  })();
</script>

/* ---------- Firebase互換フック ---------- */
function loadFromFirebase(state){
  members = state.members || members || [];
  players = state.players || players || [];
  schedule = state.schedule || schedule || [];
  showingRounds = state.showingRounds || showingRounds || 5;
  maxRounds = state.maxRounds || maxRounds || schedule.length || 5;
  renderMembers();
  render();
  updateRanking();
  if(window.updateRoomDisplay) window.updateRoomDisplay();
}
window.loadFromFirebase = loadFromFirebase;

/* ---------- UI初期化（人数4..11） ---------- */
const pc = document.getElementById("playerCount");
for(let i=4;i<=11;i++){ const opt=document.createElement("option"); opt.value=i; opt.text = i+"人"; pc.appendChild(opt); }
pc.value = 8;
pc.onchange = setupGuests;

/* ---------- メンバー登録 / スロット割当 ---------- */
function renderMembers(){
  const list = document.getElementById("memberList"); list.innerHTML = "";
  members.forEach((m,i)=>{
    const div = document.createElement("div"); div.className="member-item";
    div.innerHTML = `${escapeHtml(m)} <button onclick="deleteMember(${i})">削除</button>`;
    list.appendChild(div);
  });
  renderMemberButtons();
}
function renderMemberButtons(){
  const area = document.getElementById("memberButtons"); area.innerHTML = "";
  members.forEach(name=>{
    const btn=document.createElement("button"); btn.className="member-btn"; btn.textContent = name;
    btn.onclick = ()=>assignGuest(name);
    btn.setAttribute("data-name", name);
    area.appendChild(btn);
  });
}
function addMember(){ const name=document.getElementById("newMember").value.trim(); if(!name) return; if(members.includes(name) || players.some(p=>p.name===name)){ alert("同じ名前があります"); return; } members.push(name); document.getElementById("newMember").value=""; saveStateToFirebaseIfReady(); renderMembers(); }
function deleteMember(i){ members.splice(i,1); saveStateToFirebaseIfReady(); renderMembers(); }

function showRegister(){ document.getElementById("menu").classList.add("hidden"); document.getElementById("register").classList.remove("hidden"); }
function showMain(){ document.getElementById("menu").classList.add("hidden"); document.getElementById("main").classList.remove("hidden"); setupGuests(); document.getElementById("shuffleList").classList.add("hidden"); }
function backMenu(){ document.getElementById("register").classList.add("hidden"); document.getElementById("main").classList.add("hidden"); document.getElementById("menu").classList.remove("hidden"); }

function setupGuests(){
  const count = parseInt(document.getElementById("playerCount").value,10);
  const area = document.getElementById("guestArea"); area.innerHTML = "";
  for(let i=1;i<=count;i++){
    const div=document.createElement("div"); div.className="guest-slot"; div.id="guest"+i; div.textContent="ゲスト"+i;
    div.onclick = function(){
      if(div.classList.contains("selected")){
        const name = div.getAttribute("data-name");
        div.textContent = "ゲスト"+i;
        div.classList.remove("selected");
        div.removeAttribute("data-name");
        if(name && !members.includes(name)){ members.push(name); saveStateToFirebaseIfReady(); renderMembers(); }
      }
    };
    area.appendChild(div);
  }
  renderMemberButtons();
}

/* assignGuest: スロットに入れたら members から削除（生成しても復活しない） */
function assignGuest(name){
  const count = parseInt(document.getElementById("playerCount").value,10);
  for(let i=1;i<=count;i++){
    const slot = document.getElementById("guest"+i);
    if(slot && slot.textContent.startsWith("ゲスト")){
      slot.textContent = name; slot.classList.add("selected"); slot.setAttribute("data-name", name);
      const idx = members.indexOf(name); if(idx !== -1) members.splice(idx,1);
      saveStateToFirebaseIfReady(); renderMembers(); return;
    }
  }
  alert("空きスロットがありません");
}

/* ---------- 生成ロジック（シャッフルしてテンプレに当てはめ） ---------- */
function generate(){
  const count = parseInt(document.getElementById("playerCount").value,10);
  // collect slot names in order
  const slotNames = [];
  for(let i=1;i<=count;i++){
    const s = document.getElementById("guest"+i);
    const name = s && s.classList.contains("selected") ? s.getAttribute("data-name") : (s ? s.textContent : ("ゲスト"+i));
    slotNames.push(name || ("ゲスト"+i));
  }

  // shuffle -> assign P1..PN
  const shuffled = slotNames.slice();
  shuffle(shuffled);
  players = shuffled.map((name,idx)=>({ name, pos: idx+1 }));

  // show mapping
  showShuffleMap(players);

  // pick template key
  const court = parseInt(document.getElementById("courtCount").value,10);
  const key = `${court}_${count}`;
  let rounds = templates[`1_${count}`] || [];

  // if template rounds < 15 (e.g., 4 has 3), repeat cyclically to make 15
  if(rounds.length < 15){
    const more = [];
    let i = 0;
    while(more.length < 15){
      more.push(JSON.parse(JSON.stringify(rounds[i % rounds.length]))); // clone
      i++;
    }
    rounds = more.slice(0,15);
  } else {
    rounds = rounds.slice(0,15);
  }

  // map template indices to players' names (template indices are 1-based)
  schedule = rounds.map(r => {
    const matches = r.matches.map(pair => {
      const t1 = pair[0].map(idx => ({ name: (idx <= players.length ? players[idx-1].name : ("空き"+idx)), pos: idx }));
      const t2 = pair[1].map(idx => ({ name: (idx <= players.length ? players[idx-1].name : ("空き"+idx)), pos: idx }));
      return { team1: t1, team2: t2, score: [null, null] };
    });
    return { matches };
  });

  maxRounds = schedule.length;
  showingRounds = Math.min(5, maxRounds);
  saveStateToFirebaseIfReady();
  render();
}

/* ---------- シャッフルマップ表示 ---------- */
function showShuffleMap(playersArr){
  const wrap = document.getElementById("shuffleList");
  const mapDiv = document.getElementById("shuffleMap");
  mapDiv.innerHTML = "";
  playersArr.forEach(p=>{
    const el = document.createElement("div");
    el.className = "map-item";
    el.textContent = `P${p.pos} → ${p.name}`;
    mapDiv.appendChild(el);
  });
  wrap.classList.remove("hidden");
}
function clearShuffle(){ document.getElementById("shuffleMap").innerHTML = ""; document.getElementById("shuffleList").classList.add("hidden"); }

/* ---------- 表示（名前で表示） ---------- */
function render(){
  const matchesDiv = document.getElementById("matches"); matchesDiv.innerHTML = "";
  schedule.forEach((round,i)=>{
    if(i >= showingRounds) return;
    const card = document.createElement("div"); card.className = "match-card";
    const bg = ["#e3f2fd","#fff3e0","#e8f5e9","#fce4ec"][i%4];
    card.style.background = bg;
    card.innerHTML = `<div style="font-weight:700;margin-bottom:8px">🏆 MATCH ${(i+1).toString().padStart(2,'0')}</div>`;
    round.matches.forEach((m,mi)=>{
      const courtLabel = `【コートA】`;
      card.innerHTML += `<div style="font-weight:600;color:#2a5298;margin-top:8px">${courtLabel}</div>`;
      const t1n0 = m.team1[0] ? m.team1[0].name : '';
      const t1n1 = m.team1[1] ? m.team1[1].name : '';
      const t2n0 = m.team2[0] ? m.team2[0].name : '';
      const t2n1 = m.team2[1] ? m.team2[1].name : '';
      card.innerHTML += `
        <div class="pair-row">
          <div class="pair">${escapeHtml(t1n0)} ＆ ${escapeHtml(t1n1)}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <div class="score-display" id="disp-${i}-${mi}-0">${renderScoreText(m.score && m.score[0])}</div>
            <input class="score-input" id="input-${i}-${mi}-0" type="number" min="0" max="99" value="${renderScoreValue(m.score && m.score[0])}" onchange="setScore(${i},${mi},0,this.value)">
            <button onclick="deleteScore(${i},${mi},0)" style="background:#e74c3c;color:#fff;border:none;padding:6px;border-radius:6px;cursor:pointer">削除</button>
          </div>
        </div>
        <div class="vs">vs</div>
        <div class="pair-row">
          <div class="pair">${escapeHtml(t2n0)} ＆ ${escapeHtml(t2n1)}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <div class="score-display" id="disp-${i}-${mi}-1">${renderScoreText(m.score && m.score[1])}</div>
            <input class="score-input" id="input-${i}-${mi}-1" type="number" min="0" max="99" value="${renderScoreValue(m.score && m.score[1])}" onchange="setScore(${i},${mi},1,this.value)">
            <button onclick="deleteScore(${i},${mi},1)" style="background:#e74c3c;color:#fff;border:none;padding:6px;border-radius:6px;cursor:pointer">削除</button>
          </div>
        </div>
      `;
    });
    matchesDiv.appendChild(card);
  });

  if(showingRounds < maxRounds){
    const btn = document.createElement("button");
    btn.textContent = `試合追加 +5（現在 ${showingRounds}/${maxRounds}）`;
    btn.onclick = ()=>{ showingRounds = Math.min(maxRounds, showingRounds+5); render(); saveStateToFirebaseIfReady(); };
    matchesDiv.appendChild(btn);
  }

  updateRanking();
}

/* ---------- スコア / ランキング ---------- */
function renderScoreText(v){ return (v===null||v===undefined)?'':String(v); }
function renderScoreValue(v){ return (v===null||v===undefined)?'':String(v); }
function setScore(roundIdx, matchIdx, team, rawVal){
  const match = schedule[roundIdx] && schedule[roundIdx].matches[matchIdx];
  if(!match) return;
  const t = String(rawVal).trim(); let newVal = null;
  if(t !== ''){
    const n = parseInt(t,10);
    if(Number.isFinite(n) && n >= 0) newVal = n; else return;
  }
  if(!match.score) match.score = [null,null];
  match.score[team] = newVal;
  updateRanking();
  saveStateToFirebaseIfReady();
  render();
}
function deleteScore(roundIdx, matchIdx, team){
  const match = schedule[roundIdx] && schedule[roundIdx].matches[matchIdx];
  if(!match || !match.score) return;
  match.score[team] = null;
  updateRanking();
  saveStateToFirebaseIfReady();
  render();
}
function updateRanking(){
  const map = {};
  players.forEach(p=>{ map[p.name] = { total:0, match:0 }; });
  schedule.forEach(round=>{
    round.matches.forEach(match=>{
      if(!match.score) return;
      const s0 = (match.score[0] !== null && match.score[0] !== undefined) ? match.score[0] : null;
      const s1 = (match.score[1] !== null && match.score[1] !== undefined) ? match.score[1] : null;
      if(s0 !== null){
        match.team1.forEach(p=>{
          if(map[p.name]){ map[p.name].total += s0; map[p.name].match++; }
        });
      }
      if(s1 !== null){
        match.team2.forEach(p=>{
          if(map[p.name]){ map[p.name].total += s1; map[p.name].match++; }
        });
      }
    });
  });
  const stats = Object.keys(map).map(name=>{
    const m = map[name];
    return { name, total: m.total, match: m.match, avg: m.match ? (m.total/m.match) : 0 };
  }).sort((a,b)=>b.avg - a.avg);
  let html = `<div class="ranking-card"><h3>🏆 ランキング</h3>`;
  html += `<table class="ranking-table"><tr><th>順位</th><th>名前</th><th>合計</th><th>試合</th><th>平均</th></tr>`;
  stats.forEach((p,i)=>{
    const medal = (i===0?"🥇": i===1?"🥈": i===2?"🥉": "");
    html += `<tr><td>${medal}${i+1}</td><td>${escapeHtml(p.name)}</td><td>${p.total}</td><td>${p.match}</td><td>${p.avg.toFixed(2)}</td></tr>`;
  });
  html += `</table></div>`;
  document.getElementById("ranking").innerHTML = html;
}

/* ---------- ユーティリティ ---------- */
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
function buildRotationalTemplate(count,court){ const r=[]; const base=Array.from({length:count},(_,i)=>i+1); const R=Math.min(15,Math.max(5,count)); for(let i=0;i<R;i++){ const arr=base.slice(i).concat(base.slice(0,i)); const matches=[]; for(let c=0;c<court;c++){ const start=c*4; if(start+3>=arr.length) break; matches.push([[arr[start],arr[start+1]],[arr[start+2],arr[start+3]]]); } if(matches.length===0 && count>=4) matches.push([[1,2],[3,4]]); r.push({matches}); } return r; }
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {

    messagingSenderId: "452972436558",
    appId: "1:452972436558:web:68357629ca021a6d6f771f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let roomRef = null;
  let unsubscribe = null;

  async function saveStateToFirebase(state){
    if(!roomRef) return Promise.reject(new Error("roomRef not set"));
    return setDoc(roomRef, state);
  }

  function subscribeToRoom(rid){
    if(unsubscribe) unsubscribe();
    roomRef = doc(db, "rooms", rid);
    unsubscribe = onSnapshot(roomRef, (snapshot)=>{
      if(snapshot.exists()){
        const state = snapshot.data();
        console.log("Firebase同期:", state);
        if(window.loadFromFirebase){
          window.loadFromFirebase(state);
        }
      } else {
        console.log("Firebase: room empty / not exists yet");
      }
    }, (err)=>{
      console.error("onSnapshot error", err);
    });
  }

  window.setRoom = function(newRoomId){
    console.log("切替 room:", newRoomId);
    subscribeToRoom(newRoomId);
    if(window.updateRoomDisplay) window.updateRoomDisplay();
  };

  if(window.roomId){
    subscribeToRoom(window.roomId);
  } else {
    window.roomId = "default";
    subscribeToRoom(window.roomId);
  }

  window.saveStateToFirebase = saveStateToFirebase;

  if(!window.loadFromFirebase){
    window.loadFromFirebase = function(state){
      players = state.players || [];
      schedule = state.schedule || [];
      showingRounds = state.showingRounds || 5;
      maxRounds = state.maxRounds || schedule.length || 5;
      if(window.updateRoomDisplay) window.updateRoomDisplay();
      render();
      updateRanking();
    };
  }
</script>
