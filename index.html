  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Noto Sans JP',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);color:#333}
    header{padding:16px;text-align:center;color:#fff;font-size:18px;font-weight:700}

    .hidden{display:none}
    button{background:linear-gradient(135deg,#ff9966,#ff5e62);border:none;padding:10px 16px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;margin:8px 4px}
    button.small{padding:6px 10px;font-size:12px}

    .ranking-table th,.ranking-table td{border:1px solid #ddd;padding:8px;text-align:center}

</head>
<body>
<header>
  <div id="appTitle">🎾TenniMatch🎾 組合せ＆ランキング v2.2.2（ハードコーディング）</div>
  <div id="roomInfo">部屋: <span id="roomIdDisplay">---</span> &nbsp; <button class="small" onclick="copyRoomLink()">リンクをコピー</button></div>
</header>

<div id="menu" class="card">
  <h2>メニュー</h2>
  <button onclick="showRegister()">メンバー登録</button>
  <button onclick="showMain()">組合せ生成</button>
  <button onclick="createRoom()">新しい部屋を作る</button>
</div>

<div id="register" class="card hidden">
  <h2>メンバー登録</h2>
  <input id="newMember" type="text" placeholder="名前を入力">
  <button onclick="addMember()">登録</button>
  <div id="memberList" style="margin-top:12px"></div>
  <br>
  <button onclick="backMenu()">戻る</button>
</div>

<div id="main" class="card hidden">
  <h2>参加者選択</h2>
  参加人数：
  <select id="playerCount"></select>
  コート数：
  <select id="courtCount">
    <option value="1">1面</option>
    <option value="2">2面</option>
  </select>

  <div id="guestArea" style="margin-top:12px"></div>

  <h3>登録者リスト</h3>
  <div id="memberButtons"></div>

  <div id="shuffleList" class="hidden card">
    <h3 style="margin-top:0">参加者シャッフル後リスト（P割当）</h3>
    <div id="shuffleMap" class="muted"></div>
    <div style="margin-top:8px"><button class="small" onclick="clearShuffle()">シャッフルリストを消す</button></div>
  </div>

  <br>
  <button onclick="generate()">生成</button>
  <button onclick="backMenu()">戻る</button>

  <div id="matches"></div>
  <div id="ranking"></div>
</div>

<!-- room id setup -->
<script>
  (function(){
    function randomId(len = 8){ const chars="abcdefghijklmnopqrstuvwxyz0123456789"; let s=""; for(let i=0;i<len;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length)); return s; }
    const params = new URLSearchParams(window.location.search);
    let rid = params.get("room");
    if(!rid){
      rid = "r-" + randomId(6);
      params.set("room", rid);
      history.replaceState({}, "", location.pathname + "?" + params.toString());
    }
    window.roomId = String(rid);
  })();
</script>

<script>
/* -------------------------
   Core data & behavior
   ------------------------- */
let members = [];            // 登録者（未割当のもののみ保持）
let players = [];            // 参加者スロットに入った順 {name,pos}
let schedule = [];           // 作成されたラウンド
let showingRounds = 5;
let maxRounds = 5;

/* ---------- templates: ハードコーディング版 ----------
   4..16 人 × 1..2 面 用テンプレートをここで用意します。
   実装方針：各人数・面数ごとに回転ローテーションで安定した組合せ（最大15ラウンド）を生成して
   変数 templates に格納。これで「外部フェッチ不要」のハードコーディング状態になります。
*/
const templates = (function buildTemplates(){
  const out = {};
  for(let count=4; count<=16; count++){
    for(let court=1; court<=2; court++){
      const key = `${count}_${court}`;
      out[key] = [];
      // 基本ロジック：プレイヤー番号 1..count を round = 0..(min(15,count)-1)分ローテーション
      const rounds = Math.min(15, Math.max(5, count)); // 少なくとも5、ただし上限15
      for(let r=0;r<rounds;r++){
        const arr = [];
        // rotate
        const baseArr = Array.from({length:count}, (_,i)=>i+1);
        const rotated = baseArr.slice(r).concat(baseArr.slice(0,r));
        // 1面あたり必要な人数 = 4 (ダブルス)
        // 1ラウンドで利用するスロット数 = court * 4
        const needed = court * 4;
        // もし人数不足なら「空き」を埋める（参加人数分だけ作る）
        const matches = [];
        for(let c=0;c<court;c++){
          const start = c*4;
          if(start + 3 >= rotated.length) break;
          const a = [rotated[start], rotated[start+1]];
          const b = [rotated[start+2], rotated[start+3]];
          matches.push([a,b]);
        }
        // もし matches が空（人数少なすぎ）なら別の作り方で最低1試合を入れる
        if(matches.length === 0){
          if(count >=4){
            matches.push([[1,2],[3,4]]);
          }
        }
        out[key].push({ matches });
      }
    }
  }
  return out;
})();

/* ---------- UI 初期化 ---------- */
const playerSelect = document.getElementById("playerCount");
for(let i=4;i<=16;i++){
  const opt = document.createElement("option");
  opt.value = i; opt.text = i + "人";
  playerSelect.appendChild(opt);
}
playerSelect.value = 16; // デフォルトを16に

document.getElementById("playerCount").onchange = setupGuests;
document.getElementById("courtCount").onchange = setupGuests;

/* ---------- メンバー登録 / 割当 ---------- */
function renderMembers(){
  const list = document.getElementById("memberList");
  list.innerHTML = "";
  members.forEach((m,i)=>{
    const div = document.createElement("div");
    div.className = "member-item";
    div.innerHTML = `${escapeHtml(m)} <button onclick="deleteMember(${i})">削除</button>`;
    list.appendChild(div);
  });
  renderMemberButtons();
}
function renderMemberButtons(){
  const area = document.getElementById("memberButtons");
  area.innerHTML = "";
  members.forEach(name=>{
    const btn = document.createElement("button");
    btn.className = "member-btn";
    btn.textContent = name;
    btn.onclick = ()=>assignGuest(name);
    area.appendChild(btn);
  });
}
function addMember(){
  const val = document.getElementById("newMember").value.trim();
  if(!val) return;
  if(members.includes(val) || players.some(p=>p.name===val)) return alert("同じ名前があります");
  members.push(val);
  document.getElementById("newMember").value = "";
  saveStateToFirebaseIfReady();
  renderMembers();
}
function deleteMember(i){ members.splice(i,1); saveStateToFirebaseIfReady(); renderMembers(); }

function setupGuests(){
  const count = parseInt(document.getElementById("playerCount").value,10);
  const area = document.getElementById("guestArea");
  area.innerHTML = "";
  for(let i=1;i<=count;i++){
    const div = document.createElement("div");
    div.className = "guest-slot";
    div.id = "guest"+i;
    div.textContent = "ゲスト"+i;
    div.onclick = function(){
      // 解除（選択済みなら元に戻す）
      if(div.classList.contains("selected")){
        const name = div.getAttribute("data-name");
        div.textContent = "ゲスト"+i;
        div.classList.remove("selected");
        div.removeAttribute("data-name");
        if(name && !members.includes(name)){
          members.push(name); // 戻す（復活しない問題はこれで解決：戻すのは本人が解除した時のみ）
          saveStateToFirebaseIfReady();
          renderMembers();
        }
      }
    };
    area.appendChild(div);
  }
  renderMemberButtons();
}

/* assignGuest -> スロットに入れたら members から削除（生成後に復活しないように） */
function assignGuest(name){
  const count = parseInt(document.getElementById("playerCount").value,10);
  for(let i=1;i<=count;i++){
    const slot = document.getElementById("guest"+i);
    if(slot && slot.textContent.startsWith("ゲスト")){
      slot.textContent = name;
      slot.classList.add("selected");
      slot.setAttribute("data-name", name);
      const idx = members.indexOf(name);
      if(idx !== -1) members.splice(idx,1); // ここで削除（復活しない）
      saveStateToFirebaseIfReady();
      renderMembers();
      return;
    }
  }
  alert("空きスロットがありません");
}

/* ---------- 生成ロジック（テンプレートは templates から） ---------- */
function generate(){
  const count = parseInt(document.getElementById("playerCount").value,10);
  players = [];
  // 今のスロットの表示順で名前を取る（選択済は data-name を、空欄はテキスト）
  for(let i=1;i<=count;i++){
    const s = document.getElementById("guest"+i);
    let name = s && s.classList.contains("selected") ? s.getAttribute("data-name") : (s ? s.textContent : ("ゲスト"+i));
    players.push({ name: name || ("ゲスト"+i), pos: i });
  }

  // P1..PN をランダムに決める（シャッフル）
  const shuffled = players.map(p=>p.name).slice();
  shuffle(shuffled);
  players = shuffled.map((name, idx)=>({ name, pos: idx+1 }));

  showShuffleMap(players);

  const court = parseInt(document.getElementById("courtCount").value,10);
  const key = `${count}_${court}`;
  let rounds = templates[key];
  if(!rounds || rounds.length === 0){
    // 最終フォールバック（滅多にない）
    rounds = buildRotationalTemplate(count, court);
  }
  rounds = rounds.slice(0,15);

  // map template indices -> player names (players pos corresponds to index-1)
  schedule = rounds.map(r=>{
    const matches = r.matches.map(pair=>{
      const t1 = pair[0].map(idx => ({ name: (idx <= players.length ? players[idx-1].name : ("空き"+idx)), pos: idx }));
      const t2 = pair[1].map(idx => ({ name: (idx <= players.length ? players[idx-1].name : ("空き"+idx)), pos: idx }));
      return { team1: t1, team2: t2, score:[null,null] };
    });
    return { matches };
  });

  maxRounds = schedule.length;
  showingRounds = Math.min(5, maxRounds);
  saveStateToFirebaseIfReady();
  render();
}

/* ---------- render ---------- */
function render(){
  const matchesDiv = document.getElementById("matches");
  matchesDiv.innerHTML = "";
  schedule.forEach((round,i)=>{
    if(i >= showingRounds) return;
    const card = document.createElement("div"); card.className = "match-card";
    const bg = ["#e3f2fd","#fff3e0","#e8f5e9","#fce4ec"][i%4];
    card.style.background = bg;
    card.innerHTML = `<div class="match-title">🏆 MATCH ${(i+1).toString().padStart(2,'0')}</div>`;
    round.matches.forEach((mm,ci)=>{
      const courtLabel = ["【コートA】","【コートB】","【コートC】"][ci] || `【コート${String.fromCharCode(65+ci)}】`;
      card.innerHTML += `<div class="court-name">${courtLabel}</div>`;
      const t1p0 = mm.team1[0] ? `P${mm.team1[0].pos}` : '';
      const t1p1 = mm.team1[1] ? `P${mm.team1[1].pos}` : '';
      const t2p0 = mm.team2[0] ? `P${mm.team2[0].pos}` : '';
      const t2p1 = mm.team2[1] ? `P${mm.team2[1].pos}` : '';
      card.innerHTML += `
        <div class="pair-row">
          <div class="pair">${escapeHtml(t1p0)} ＆ ${escapeHtml(t1p1)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="score-display" id="disp-${i}-${ci}-0">${renderScoreText(mm.score && mm.score[0])}</div>
            <input class="score-input" id="input-${i}-${ci}-0" type="number" min="0" max="99" value="${renderScoreValue(mm.score && mm.score[0])}" onchange="setScore(${i},${ci},0,this.value)">
            <button class="delete-score" onclick="deleteScore(${i},${ci},0)">削除</button>
          </div>
        </div>
        <div class="vs">vs</div>
        <div class="pair-row">
          <div class="pair">${escapeHtml(t2p0)} ＆ ${escapeHtml(t2p1)}</div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="score-display" id="disp-${i}-${ci}-1">${renderScoreText(mm.score && mm.score[1])}</div>
            <input class="score-input" id="input-${i}-${ci}-1" type="number" min="0" max="99" value="${renderScoreValue(mm.score && mm.score[1])}" onchange="setScore(${i},${ci},1,this.value)">
            <button class="delete-score" onclick="deleteScore(${i},${ci},1)">削除</button>
          </div>
        </div>
      `;
    });
    matchesDiv.appendChild(card);
  });

  if(showingRounds < maxRounds){
    const btn = document.createElement("button");
    btn.textContent = `試合追加 +5（現在 ${showingRounds}/${maxRounds}）`;
    btn.onclick = ()=>{ showingRounds = Math.min(maxRounds, showingRounds + 5); render(); saveStateToFirebaseIfReady(); };
    matchesDiv.appendChild(btn);
  }

  updateRanking();
}

/* ---------- score / ranking ---------- */
function renderScoreText(val){ return (val===null||val===undefined)?'':String(val); }
function renderScoreValue(val){ return (val===null||val===undefined)?'':String(val); }

function setScore(roundIdx, matchIdx, team, rawVal){
  const match = schedule[roundIdx] && schedule[roundIdx].matches[matchIdx];
  if(!match) return;
  const s = String(rawVal).trim();
  let newVal = null;
  if(s !== ''){
    const n = parseInt(s,10);
    if(Number.isFinite(n) && n>=0) newVal = n;
    else return;
  }
  if(!match.score) match.score = [null,null];
  match.score[team] = newVal;
  updateRanking();
  saveStateToFirebaseIfReady();
  render();
}
function deleteScore(roundIdx, matchIdx, team){
  const match = schedule[roundIdx] && schedule[roundIdx].matches[matchIdx];
  if(!match || !match.score) return;
  match.score[team] = null;
  updateRanking();
  saveStateToFirebaseIfReady();
  render();
}

function updateRanking(){
  const map = {};
  players.forEach(p=>{ map[p.name] = { total:0, match:0 }; });
  schedule.forEach(round=>{
    round.matches.forEach(match=>{
      if(!match.score) return;
      const s0 = (match.score[0]!==null&&match.score[0]!==undefined)?match.score[0]:null;
      const s1 = (match.score[1]!==null&&match.score[1]!==undefined)?match.score[1]:null;
      if(s0!==null) match.team1.forEach(p=>{ if(map[p.name]){ map[p.name].total+=s0; map[p.name].match++; } });
      if(s1!==null) match.team2.forEach(p=>{ if(map[p.name]){ map[p.name].total+=s1; map[p.name].match++; } });
    });
  });
  const stats = Object.keys(map).map(name=>{
    const m = map[name]; return { name, total:m.total, match:m.match, avg: m.match? (m.total/m.match):0 };
  }).sort((a,b)=>b.avg - a.avg);

  let html = `<div class="ranking-card"><h3>🏆 ランキング</h3><table class="ranking-table"><tr><th>順位</th><th>名前</th><th>合計</th><th>試合</th><th>平均</th></tr>`;
  stats.forEach((p,i)=>{ const medal = i===0?'🥇': i===1?'🥈': i===2?'🥉':''; html += `<tr><td>${medal}${i+1}</td><td>${escapeHtml(p.name)}</td><td>${p.total}</td><td>${p.match}</td><td>${p.avg.toFixed(2)}</td></tr>`; });
  html += `</table></div>`;
  document.getElementById("ranking").innerHTML = html;
}

/* ---------- shuffle map UI ---------- */
function showShuffleMap(playersArr){
  const wrap = document.getElementById("shuffleList");
  const mapDiv = document.getElementById("shuffleMap");
  mapDiv.innerHTML = "";
  playersArr.forEach(p=>{
    const el = document.createElement("div"); el.className = "map-item"; el.textContent = `P${p.pos} → ${p.name}`; mapDiv.appendChild(el);
  });
  wrap.classList.remove("hidden");
}
function clearShuffle(){ document.getElementById("shuffleMap").innerHTML = ""; document.getElementById("shuffleList").classList.add("hidden"); }

/* ---------- utility & fallback ---------- */
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }
function buildRotationalTemplate(count, court){ // fallback if templates missing
  const rounds=[]; const playersIdx=Array.from({length:count},(_,i)=>i+1); const maxR=Math.min(15,Math.max(5,count));
  for(let r=0;r<maxR;r++){
    const arr = playersIdx.slice(r).concat(playersIdx.slice(0,r)); const roundMatches=[];
    for(let c=0;c<court;c++){ const base=c*4; if(base+3>=arr.length) break; roundMatches.push([[arr[base],arr[base+1]],[arr[base+2],arr[base+3]]]); }
    if(roundMatches.length===0 && count>=4) roundMatches.push([[1,2],[3,4]]);
    rounds.push({ matches: roundMatches });
  }
  return rounds;
}

/* ---------- persistence / room / firebase (既存の安定実装を使用) ---------- */
function saveStateToFirebaseIfReady(){
  if(window.saveStateToFirebase){
    try{
      window.saveStateToFirebase({ members, players, schedule, showingRounds, maxRounds }).catch(e=>console.warn("save error", e));
    }catch(e){ console.warn("saveStateToFirebase call error", e); }
  }
}

function loadMembers(){ if(!members) members=[]; renderMembers(); }

/* ---------- room utils ---------- */
function randomId(len=8){ const chars="abcdefghijklmnopqrstuvwxyz0123456789"; let s=""; for(let i=0;i<len;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length)); return s; }
function createRoom(){ const newId="r-"+randomId(6); const params=new URLSearchParams(window.location.search); params.set("room",newId); history.pushState({}, "", location.pathname + "?" + params.toString()); window.roomId=newId; if(window.setRoom) window.setRoom(newId); players=[]; schedule=[]; showingRounds=5; maxRounds=5; loadMembers(); setupGuests(); render(); alert("新しい部屋を作成しました: " + newId); }
function copyRoomLink(){ navigator.clipboard?.writeText(location.href).then(()=>alert("リンクをコピーしました")).catch(()=>prompt("このURLをコピーしてください（Ctrl+C）", location.href)); }
function updateRoomDisplay(){ const el=document.getElementById("roomIdDisplay"); if(el) el.textContent = window.roomId || "—"; }

/* ---------- small helpers ---------- */
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- bootstrap ---------- */
updateRoomDisplay();
loadMembers();
setupGuests();

/* expose for firebase module */
window.createRoom = createRoom;
window.copyRoomLink = copyRoomLink;
window.updateRoomDisplay = updateRoomDisplay;
window.loadFromFirebase = function(state){
  members = state.members || members || [];
  players = state.players || players || [];
  schedule = state.schedule || schedule || [];
  showingRounds = state.showingRounds || showingRounds || 5;
  maxRounds = state.maxRounds || maxRounds || schedule.length || 5;
  updateRoomDisplay();
  renderMembers();
  render();
  updateRanking();
};
</script>

<!-- Firebase module (そのまま：既存設定に合わせる) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyBXBOgFKYf5hOJXnxgT7xMwkQREv1tXxWg",
    authDomain: "tennis-match-ranking-man-58aee.firebaseapp.com",
    projectId: "tennis-match-ranking-man-58aee",
    storageBucket: "tennis-match-ranking-man-58aee.firebasestorage.app",
    messagingSenderId: "452972436558",
    appId: "1:452972436558:web:68357629ca021a6d6f771f"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let roomRef = null;
  let unsubscribe = null;
  async function saveStateToFirebase(state){
    if(!roomRef) return Promise.reject(new Error("roomRef not set"));
    return setDoc(roomRef, state);
  }
  function subscribeToRoom(rid){
    if(unsubscribe) unsubscribe();
    roomRef = doc(db, "rooms", rid);
    unsubscribe = onSnapshot(roomRef, snapshot=>{
      if(snapshot.exists()){
        const state = snapshot.data();
        console.log("Firebase同期:", state);
        if(window.loadFromFirebase) window.loadFromFirebase(state);
      } else {
        console.log("Firebase: room empty / not exists yet");
      }
    }, err=>{ console.error("onSnapshot error", err); });
  }
  window.setRoom = function(newRoomId){ subscribeToRoom(newRoomId); if(window.updateRoomDisplay) window.updateRoomDisplay(); };
  if(window.roomId) subscribeToRoom(window.roomId);
  else { window.roomId = "default"; subscribeToRoom(window.roomId); }
  window.saveStateToFirebase = saveStateToFirebase;
</script>
</body>
